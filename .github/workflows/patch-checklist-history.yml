name: Patch Fleet Status checklist history

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-checklist-history.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Add checklist history and align badge
        run: |
          python - <<'PY'
          from pathlib import Path
          page = Path('site/fleet-status.html')
          text = page.read_text(encoding='utf-8')
          original = text

          def replace_once(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f'Missing expected text for {label}')
              text = text.replace(old, new, 1)

          if '.checklist-flag{margin-left:auto;' not in text:
              replace_once('.checklist-flag{display:inline-flex;', '.checklist-flag{margin-left:auto;display:inline-flex;', 'align checklist badge')

          if '.history-list{' not in text:
              replace_once('.request-card h4{margin:0}.request-card p{margin:0;color:var(--muted);font-size:.86rem}', '.request-card h4{margin:0}.request-card p{margin:0;color:var(--muted);font-size:.86rem}.history-list{display:grid;gap:8px;margin-top:10px}.history-card{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:#fff;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}.history-card strong{display:block;overflow-wrap:anywhere}.history-card small{display:block;color:var(--muted);font-weight:800;margin-top:3px}.history-card p{grid-column:1/-1;margin:0;color:var(--charcoal);font-size:.86rem;overflow-wrap:anywhere}.history-card .danger-button{display:none;min-height:38px}body.admin-on .history-card .danger-button{display:inline-flex}', 'history styles')

          if 'function vehicleChecklists(v)' not in text:
              replace_once('function vehicleRequests(v){const vrm=normaliseVrm(v?.vrm);return requests.filter(r=>normaliseVrm(r.vehicle)===vrm&&r.status!=="Cancelled")}function latestChecklist(v){return checklists.find(c=>c.vehicle_id===v?.id)||checklists.find(c=>normaliseVrm(c.vehicle_vrm)===normaliseVrm(v?.vrm))||null}', 'function vehicleRequests(v){const vrm=normaliseVrm(v?.vrm);return requests.filter(r=>normaliseVrm(r.vehicle)===vrm&&r.status!=="Cancelled")}function vehicleChecklists(v){const vrm=normaliseVrm(v?.vrm);return checklists.filter(c=>c.vehicle_id===v?.id||normaliseVrm(c.vehicle_vrm)===vrm)}function latestChecklist(v){return vehicleChecklists(v)[0]||null}', 'checklist helper')

          old_detail_start = 'const reqs=vehicleRequests(v),check=latestChecklist(v),checkState=checklistState(v);vehicleDetail.innerHTML=`'
          new_detail_start = 'const reqs=vehicleRequests(v),history=vehicleChecklists(v),check=history[0]||null,checkState=checklistState(v);vehicleDetail.innerHTML=`'
          if 'history=vehicleChecklists(v)' not in text:
              replace_once(old_detail_start, new_detail_start, 'detail history variable')

          old_history_insert = '<div class="section-title"><h3>Requested items</h3><small>${reqs.length} shown</small></div><div class="request-list">'
          new_history_insert = '<div class="section-title"><h3>Checklist history</h3><small>${history.length} shown</small></div><div class="history-list">${history.map(c=>`<article class="history-card"><div><strong>${escapeHtml(formatDate(c.completed_at))}</strong><small>By ${escapeHtml(c.completed_by||"Unknown")}</small></div><button class="danger-button" data-delete-checklist="${escapeHtml(c.id)}" type="button">Delete</button>${c.notes?`<p>${escapeHtml(c.notes)}</p>`:""}</article>`).join("")||`<div class="empty">No checklists recorded for this vehicle.</div>`}</div><div class="section-title" style="margin-top:16px"><h3>Requested items</h3><small>${reqs.length} shown</small></div><div class="request-list">'
          if '<h3>Checklist history</h3>' not in text:
              replace_once(old_history_insert, new_history_insert, 'history section')

          if 'async function deleteChecklist(' not in text:
              replace_once('async function updateStatus(id){const status=$("#detailStatus")?.value;if(!status)return;await check(await db.from("fleet_vehicles").update({status,status_updated_at:new Date().toISOString(),status_updated_by:supervisorName()}).eq("id",id),"Updating status");await loadData();showToast("Vehicle status updated.")}async function recordChecklist(id){const v=vehicles.find(x=>x.id===id),by=$("#checklistBy")?.value.trim()||supervisorName();if(!v)return;await check(await db.from("fleet_checklists").insert({vehicle_id:v.id,vehicle_vrm:formatVrm(v.vrm),completed_by:by}),"Recording checklist");await loadData();showToast("Checklist recorded.")}', 'async function updateStatus(id){const status=$("#detailStatus")?.value;if(!status)return;await check(await db.from("fleet_vehicles").update({status,status_updated_at:new Date().toISOString(),status_updated_by:supervisorName()}).eq("id",id),"Updating status");await loadData();showToast("Vehicle status updated.")}async function recordChecklist(id){const v=vehicles.find(x=>x.id===id),by=$("#checklistBy")?.value.trim()||supervisorName();if(!v)return;await check(await db.from("fleet_checklists").insert({vehicle_id:v.id,vehicle_vrm:formatVrm(v.vrm),completed_by:by}),"Recording checklist");await loadData();showToast("Checklist recorded.")}async function deleteChecklist(id){if(!adminUnlocked)return;if(!confirm("Delete this checklist record?"))return;await check(await db.from("fleet_checklists").delete().eq("id",id),"Deleting checklist");await loadData();showToast("Checklist deleted.")}', 'delete checklist function')

          old_click = 'vehicleDetail.addEventListener("click",e=>{const status=e.target.closest("[data-update-status]"),check=e.target.closest("[data-record-checklist]");if(status)updateStatus(status.dataset.updateStatus);if(check)recordChecklist(check.dataset.recordChecklist)});'
          new_click = 'vehicleDetail.addEventListener("click",e=>{const status=e.target.closest("[data-update-status]"),check=e.target.closest("[data-record-checklist]"),deleteCheck=e.target.closest("[data-delete-checklist]");if(status)updateStatus(status.dataset.updateStatus);if(check)recordChecklist(check.dataset.recordChecklist);if(deleteCheck)deleteChecklist(deleteCheck.dataset.deleteChecklist)});'
          if 'data-delete-checklist' in text and 'deleteCheck=e.target.closest' not in text:
              replace_once(old_click, new_click, 'checklist delete click')

          if text == original:
              raise SystemExit('No page changes made')
          page.write_text(text, encoding='utf-8')

          schema = Path('site/fleet-status-schema.sql')
          sql = schema.read_text(encoding='utf-8')
          original_sql = sql
          sql = sql.replace('grant insert on public.fleet_checklists to anon, authenticated;', 'grant insert on public.fleet_checklists to anon, authenticated;\ngrant delete on public.fleet_checklists to authenticated;')
          if 'Supervisors can delete fleet checklists' not in sql:
              sql = sql.replace('create policy "Public users can record fleet checklists"\n  on public.fleet_checklists for insert\n  to anon, authenticated\n  with check (true);', 'create policy "Public users can record fleet checklists"\n  on public.fleet_checklists for insert\n  to anon, authenticated\n  with check (true);\n\ndrop policy if exists "Supervisors can delete fleet checklists" on public.fleet_checklists;\ncreate policy "Supervisors can delete fleet checklists"\n  on public.fleet_checklists for delete\n  to authenticated\n  using (true);')
          if sql != original_sql:
              schema.write_text(sql, encoding='utf-8')
          PY

      - name: Commit and push gh-pages change
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fleet-status.html fleet-status-schema.sql
          git commit -m "Add Fleet Status checklist history"
          git push origin gh-pages

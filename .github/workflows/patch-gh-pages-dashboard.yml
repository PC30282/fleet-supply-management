name: Patch gh-pages dashboard grouping

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-gh-pages-dashboard.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Group vehicle equipment requests by VRM
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('site/index.html')
          text = path.read_text(encoding='utf-8')
          old = '''function renderDashboard(){renderMetrics();const term=searchInput.value.trim().toLowerCase(),status=statusFilter.value,visible=requests.filter(r=>r.section===currentSection).filter(r=>status==="All"||r.status===status).filter(r=>!term||[r.item,r.vehicle,r.requester,r.notes].join(" ").toLowerCase().includes(term)).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));$("#visibleCount").textContent=`${visible.length} shown`;if(!visible.length){requestList.innerHTML=`<div class="empty">No requests found.</div>`;return}requestList.innerHTML=visible.map(r=>`<article class="request-card" data-status="${escapeHtml(r.status)}"><div class="request-main"><div><h4>${escapeHtml(r.item)}</h4><div class="request-meta"><span>Qty ${escapeHtml(r.quantity)}</span><span>${escapeHtml(displayVehicle(r))}</span><span>Collar ${escapeHtml(r.requester)}</span><span>${formatDate(r.created_at)}</span></div></div><span class="status ${statusClass(r.status)}">${escapeHtml(r.status)}</span></div>${r.notes?`<p class="request-note">${escapeHtml(r.notes)}</p>`:""}<div class="manage-row"><select data-status-for="${escapeHtml(r.id)}">${["Pending","Ordered","Delivered","Cancelled"].map(o=>`<option value="${o}" ${o===r.status?"selected":""}>${o}</option>`).join("")}</select><button class="danger-button" data-delete="${escapeHtml(r.id)}" type="button">Delete</button></div></article>`).join("")}'''
          new = '''function requestCard(r){return `<article class="request-card" data-status="${escapeHtml(r.status)}"><div class="request-main"><div><h4>${escapeHtml(r.item)}</h4><div class="request-meta"><span>Qty ${escapeHtml(r.quantity)}</span><span>${escapeHtml(displayVehicle(r))}</span><span>Collar ${escapeHtml(r.requester)}</span><span>${formatDate(r.created_at)}</span></div></div><span class="status ${statusClass(r.status)}">${escapeHtml(r.status)}</span></div>${r.notes?`<p class="request-note">${escapeHtml(r.notes)}</p>`:""}<div class="manage-row"><select data-status-for="${escapeHtml(r.id)}">${["Pending","Ordered","Delivered","Cancelled"].map(o=>`<option value="${o}" ${o===r.status?"selected":""}>${o}</option>`).join("")}</select><button class="danger-button" data-delete="${escapeHtml(r.id)}" type="button">Delete</button></div></article>`}
          function renderDashboard(){renderMetrics();const term=searchInput.value.trim().toLowerCase(),status=statusFilter.value,visible=requests.filter(r=>r.section===currentSection).filter(r=>status==="All"||r.status===status).filter(r=>!term||[r.item,r.vehicle,r.requester,r.notes].join(" ").toLowerCase().includes(term)).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));$("#visibleCount").textContent=`${visible.length} shown`;if(!visible.length){requestList.innerHTML=`<div class="empty">No requests found.</div>`;return}if(currentSection==="Vehicle Equipment"){const groups=new Map();visible.forEach(r=>{const key=displayVehicle(r);if(!groups.has(key))groups.set(key,[]);groups.get(key).push(r)});requestList.innerHTML=[...groups.entries()].map(([vehicle,items])=>`<section style="display:grid;gap:8px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.72);padding:10px"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:900;color:var(--charcoal);padding:2px 4px"><span>${escapeHtml(vehicle)}</span><small style="color:var(--muted);font-weight:800">${items.length} item${items.length===1?"":"s"} needed</small></div>${items.map(requestCard).join("")}</section>`).join("");return}requestList.innerHTML=visible.map(requestCard).join("")}'''
          if old not in text:
              raise SystemExit('Dashboard render block not found; no patch applied')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Commit and push gh-pages change
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html
            git commit -m "Group vehicle equipment dashboard by VRM"
            git push origin gh-pages
          fi

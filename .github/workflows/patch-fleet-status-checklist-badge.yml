name: Patch fleet status checklist badge display

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-fleet-status-checklist-badge.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Hide checklist badge unless vehicle is on-road
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('site/fleet-status.html')
          text = path.read_text(encoding='utf-8')
          old = 'function checklistBadge(v){const state=checklistState(v);return `<span class="checklist-flag ${state.badgeClass}">${escapeHtml(state.label)}</span>`}'
          new = 'function checklistBadge(v){if(v?.status!=="On-Road")return "";const state=checklistState(v);return `<span class="checklist-flag ${state.badgeClass}">${escapeHtml(state.label)}</span>`}'
          if old not in text and new not in text:
              raise SystemExit('Could not find checklistBadge function')
          if old in text:
              text = text.replace(old, new, 1)
          Path('site/.pages-refresh').write_text('Refreshed GitHub Pages deployment on 2026-07-14 after hiding checklist badges for reported and off-road vehicles.\n', encoding='utf-8')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit and push gh-pages change
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fleet-status.html .pages-refresh
          git commit -m "Hide checklist badge for non on-road vehicles"
          git push origin gh-pages
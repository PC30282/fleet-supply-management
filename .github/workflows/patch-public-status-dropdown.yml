name: Patch public fleet status dropdown

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-public-status-dropdown.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Patch page without failing on exact text drift
        run: |
          python - <<'PY'
          from pathlib import Path
          page = Path('site/fleet-status.html')
          text = page.read_text(encoding='utf-8')
          debug = []

          marker = '.pill.neutral{background:#eef1f4;color:var(--muted)}'
          if '.status-select{' not in text and marker in text:
              text = text.replace(marker, marker + '.status-select{width:auto;min-height:38px;border-radius:999px;padding:7px 32px 7px 12px;font-weight:900;font-size:.78rem;border:0}.status-select.on{background:var(--green2);color:var(--green)}.status-select.reported{background:var(--amber2);color:var(--amber)}.status-select.off{background:var(--red2);color:var(--red)}', 1)
              debug.append('css: added')
          else:
              debug.append('css: already present or marker missing')

          req_helper = 'function requestStatusOptions(status){return ["Pending","Ordered","Delivered","Cancelled"].map(option=>`<option value="${option}" ${option===status?"selected":""}>${option}</option>`).join("")}'
          if 'function vehicleStatusOptions(status)' not in text and req_helper in text:
              text = text.replace(req_helper, req_helper + 'function vehicleStatusOptions(status){return ["On-Road","Reported","Off-Road"].map(option=>`<option value="${option}" ${option===status?"selected":""}>${option}</option>`).join("")}', 1)
              debug.append('vehicleStatusOptions: added')
          else:
              debug.append('vehicleStatusOptions: already present or helper missing')

          old_pill = '<span class="pill ${statusClass(v.status)}">${escapeHtml(v.status)}</span>'
          new_dropdown = '<select class="status-select ${statusClass(v.status)}" data-vehicle-status="${escapeHtml(v.id)}" aria-label="Vehicle status">${vehicleStatusOptions(v.status)}</select>'
          detail_start = text.find('function renderDetail()')
          if 'data-vehicle-status' not in text and detail_start >= 0:
              pos = text.find(old_pill, detail_start)
              if pos >= 0:
                  text = text[:pos] + new_dropdown + text[pos + len(old_pill):]
                  debug.append('detail dropdown: added')
              else:
                  debug.append('detail dropdown: old pill not found after renderDetail')
          else:
              debug.append('detail dropdown: already present or renderDetail missing')

          block_start = '<section class="admin-panel"><div class="section-title"><h3>Supervisor actions</h3>'
          if block_start in text:
              start = text.index(block_start)
              end = text.find('</section>`}', start)
              if end >= 0:
                  text = text[:start] + '`}' + text[end + len('</section>`}'):]
                  debug.append('supervisor actions: removed')
              else:
                  debug.append('supervisor actions: end not found')
          else:
              debug.append('supervisor actions: not present')

          old_update = 'async function updateStatus(id){const status=$("#detailStatus")?.value;if(!status)return;await check(await db.from("fleet_vehicles").update({status,status_updated_at:new Date().toISOString(),status_updated_by:supervisorName()}).eq("id",id),"Updating status");await loadData();showToast("Vehicle status updated.")}'
          new_update = 'async function updateVehicleStatus(id,status){const v=vehicles.find(x=>x.id===id);if(!v)return;const collar=prompt(`Enter your collar number to mark ${formatVrm(v.vrm)} as ${status}:`);if(!collar||!collar.trim()){render();return}const clean=collar.trim().replace(/[^0-9A-Za-z]/g,"");if(!clean){render();showToast("Collar number is required.");return}await check(await db.rpc("update_fleet_vehicle_status",{vehicle_id:id,new_status:status,collar_number:clean}),"Updating status");await loadData();showToast("Vehicle status updated.")}'
          if 'async function updateVehicleStatus' not in text and old_update in text:
              text = text.replace(old_update, new_update, 1)
              debug.append('update function: replaced')
          else:
              debug.append('update function: already present or old function missing')

          old_click = 'vehicleDetail.addEventListener("click",e=>{const status=e.target.closest("[data-update-status]"),check=e.target.closest("[data-record-checklist]"),deleteCheck=e.target.closest("[data-delete-checklist]"),deleteReq=e.target.closest("[data-delete-request]");if(status)updateStatus(status.dataset.updateStatus);if(check)recordChecklist(check.dataset.recordChecklist);if(deleteCheck)deleteChecklist(deleteCheck.dataset.deleteChecklist);if(deleteReq)deleteRequest(deleteReq.dataset.deleteRequest)});'
          new_click = 'vehicleDetail.addEventListener("click",e=>{const deleteCheck=e.target.closest("[data-delete-checklist]"),deleteReq=e.target.closest("[data-delete-request]");if(deleteCheck)deleteChecklist(deleteCheck.dataset.deleteChecklist);if(deleteReq)deleteRequest(deleteReq.dataset.deleteRequest)});'
          if old_click in text:
              text = text.replace(old_click, new_click, 1)
              debug.append('click handler: replaced')
          else:
              debug.append('click handler: old handler missing')

          old_change = 'vehicleDetail.addEventListener("change",e=>{const requestStatus=e.target.closest("[data-request-status]");if(requestStatus)updateRequestStatus(requestStatus.dataset.requestStatus,requestStatus.value)});'
          new_change = 'vehicleDetail.addEventListener("change",e=>{const vehicleStatus=e.target.closest("[data-vehicle-status]"),requestStatus=e.target.closest("[data-request-status]");if(vehicleStatus){updateVehicleStatus(vehicleStatus.dataset.vehicleStatus,vehicleStatus.value);return}if(requestStatus)updateRequestStatus(requestStatus.dataset.requestStatus,requestStatus.value)});'
          if old_change in text:
              text = text.replace(old_change, new_change, 1)
              debug.append('change handler: replaced')
          else:
              debug.append('change handler: old handler missing')

          page.write_text(text, encoding='utf-8')

          schema = Path('site/fleet-status-schema.sql')
          sql = schema.read_text(encoding='utf-8')
          if 'update_fleet_vehicle_status' not in sql:
              sql = sql.rstrip() + '''

create or replace function public.update_fleet_vehicle_status(
  vehicle_id uuid,
  new_status text,
  collar_number text
)
returns void
language plpgsql
security definer
set search_path = public
as $$
begin
  if new_status not in ('On-Road', 'Reported', 'Off-Road') then
    raise exception 'Invalid vehicle status';
  end if;

  if nullif(trim(collar_number), '') is null then
    raise exception 'Collar number is required';
  end if;

  update public.fleet_vehicles
  set status = new_status,
      status_updated_at = now(),
      status_updated_by = 'Collar ' || trim(collar_number)
  where id = vehicle_id;

  if not found then
    raise exception 'Vehicle not found';
  end if;
end;
$$;

grant execute on function public.update_fleet_vehicle_status(uuid, text, text) to anon, authenticated;
'''
              schema.write_text(sql + '\n', encoding='utf-8')
              debug.append('schema function: added')
          else:
              debug.append('schema function: already present')

          debug.append('has data-vehicle-status: ' + str('data-vehicle-status' in text))
          debug.append('has Supervisor actions: ' + str('Supervisor actions' in text))
          debug.append('has updateVehicleStatus: ' + str('updateVehicleStatus' in text))
          Path('site/patch-public-status-debug.txt').write_text('\n'.join(debug) + '\n', encoding='utf-8')
          Path('site/.pages-refresh').write_text('Refreshed GitHub Pages deployment on 2026-07-14 after public vehicle status dropdown update.\n', encoding='utf-8')
          PY

      - name: Commit and push gh-pages change
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fleet-status.html fleet-status-schema.sql patch-public-status-debug.txt .pages-refresh
          git commit -m "Add public fleet status dropdown"
          git push origin gh-pages
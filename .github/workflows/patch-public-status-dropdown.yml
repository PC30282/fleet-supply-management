name: Patch public fleet status dropdown

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-public-status-dropdown.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Add public status dropdown and database helper
        run: |
          python - <<'PY'
          from pathlib import Path
          page = Path('site/fleet-status.html')
          text = page.read_text(encoding='utf-8')

          css_old = '.pill.neutral{background:#eef1f4;color:var(--muted)}a.button,.primary-button,.quiet-button,.danger-button,.icon-button{min-height:42px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:8px;font-weight:800;text-decoration:none}'
          css_new = '.pill.neutral{background:#eef1f4;color:var(--muted)}.status-select{width:auto;min-height:38px;border-radius:999px;padding:7px 32px 7px 12px;font-weight:900;font-size:.78rem;border:0}.status-select.on{background:var(--green2);color:var(--green)}.status-select.reported{background:var(--amber2);color:var(--amber)}.status-select.off{background:var(--red2);color:var(--red)}a.button,.primary-button,.quiet-button,.danger-button,.icon-button{min-height:42px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:8px;font-weight:800;text-decoration:none}'
          if css_old in text:
              text = text.replace(css_old, css_new, 1)

          helper_old = 'function requestStatusOptions(status){return ["Pending","Ordered","Delivered","Cancelled"].map(option=>`<option value="${option}" ${option===status?"selected":""}>${option}</option>`).join("")}'
          helper_new = 'function requestStatusOptions(status){return ["Pending","Ordered","Delivered","Cancelled"].map(option=>`<option value="${option}" ${option===status?"selected":""}>${option}</option>`).join("")}function vehicleStatusOptions(status){return ["On-Road","Reported","Off-Road"].map(option=>`<option value="${option}" ${option===status?"selected":""}>${option}</option>`).join("")}'
          if helper_old not in text and helper_new not in text:
              raise SystemExit('Could not find requestStatusOptions helper')
          if helper_old in text:
              text = text.replace(helper_old, helper_new, 1)

          title_old = '<span class="pill ${statusClass(v.status)}">${escapeHtml(v.status)}</span></div></div><div class="detail-grid">'
          title_new = '<select class="status-select ${statusClass(v.status)}" data-vehicle-status="${escapeHtml(v.id)}" aria-label="Vehicle status">${vehicleStatusOptions(v.status)}</select></div></div><div class="detail-grid">'
          if title_old not in text and title_new not in text:
              raise SystemExit('Could not find detail title status pill')
          if title_old in text:
              text = text.replace(title_old, title_new, 1)

          old_section = '<section class="admin-panel"><div class="section-title"><h3>Supervisor actions</h3><small>${escapeHtml(formatVrm(v.vrm))}</small></div><div class="form-grid"><div class="field"><label for="detailStatus">Vehicle status</label><select id="detailStatus"><option ${v.status==="On-Road"?"selected":""}>On-Road</option><option ${v.status==="Reported"?"selected":""}>Reported</option><option ${v.status==="Off-Road"?"selected":""}>Off-Road</option></select></div><div class="field"><label for="checklistBy">Checklist completed by</label><input id="checklistBy" value="${escapeHtml(supervisorName())}" autocomplete="off"></div></div><div class="form-actions"><button class="primary-button" data-update-status="${escapeHtml(v.id)}" type="button">Update status</button><button class="quiet-button" data-record-checklist="${escapeHtml(v.id)}" type="button">Record checklist</button></div></section>`}'
          new_section = '`}'
          if old_section in text:
              text = text.replace(old_section, new_section, 1)
          elif 'Supervisor actions' in text:
              raise SystemExit('Supervisor actions still present but exact block was not found')

          old_funcs = 'async function updateStatus(id){const status=$("#detailStatus")?.value;if(!status)return;await check(await db.from("fleet_vehicles").update({status,status_updated_at:new Date().toISOString(),status_updated_by:supervisorName()}).eq("id",id),"Updating status");await loadData();showToast("Vehicle status updated.")}async function recordChecklist(id){const v=vehicles.find(x=>x.id===id),by=$("#checklistBy")?.value.trim()||supervisorName();if(!v)return;await check(await db.from("fleet_checklists").insert({vehicle_id:v.id,vehicle_vrm:formatVrm(v.vrm),completed_by:by}),"Recording checklist");await loadData();showToast("Checklist recorded.")}'
          new_funcs = 'async function updateVehicleStatus(id,status){const v=vehicles.find(x=>x.id===id);if(!v)return;const collar=prompt(`Enter your collar number to mark ${formatVrm(v.vrm)} as ${status}:`);if(!collar||!collar.trim()){render();return}const clean=collar.trim().replace(/[^0-9A-Za-z]/g,"");if(!clean){render();showToast("Collar number is required.");return}await check(await db.rpc("update_fleet_vehicle_status",{vehicle_id:id,new_status:status,collar_number:clean}),"Updating status");await loadData();showToast("Vehicle status updated.")}async function recordChecklist(id){const v=vehicles.find(x=>x.id===id),by=supervisorName();if(!v)return;await check(await db.from("fleet_checklists").insert({vehicle_id:v.id,vehicle_vrm:formatVrm(v.vrm),completed_by:by}),"Recording checklist");await loadData();showToast("Checklist recorded.")}'
          if old_funcs not in text and new_funcs not in text:
              raise SystemExit('Could not find status/checklist functions')
          if old_funcs in text:
              text = text.replace(old_funcs, new_funcs, 1)

          old_events = 'vehicleDetail.addEventListener("click",e=>{const status=e.target.closest("[data-update-status]"),check=e.target.closest("[data-record-checklist]"),deleteCheck=e.target.closest("[data-delete-checklist]"),deleteReq=e.target.closest("[data-delete-request]");if(status)updateStatus(status.dataset.updateStatus);if(check)recordChecklist(check.dataset.recordChecklist);if(deleteCheck)deleteChecklist(deleteCheck.dataset.deleteChecklist);if(deleteReq)deleteRequest(deleteReq.dataset.deleteRequest)});vehicleDetail.addEventListener("change",e=>{const requestStatus=e.target.closest("[data-request-status]");if(requestStatus)updateRequestStatus(requestStatus.dataset.requestStatus,requestStatus.value)});'
          new_events = 'vehicleDetail.addEventListener("click",e=>{const deleteCheck=e.target.closest("[data-delete-checklist]"),deleteReq=e.target.closest("[data-delete-request]");if(deleteCheck)deleteChecklist(deleteCheck.dataset.deleteChecklist);if(deleteReq)deleteRequest(deleteReq.dataset.deleteRequest)});vehicleDetail.addEventListener("change",e=>{const vehicleStatus=e.target.closest("[data-vehicle-status]"),requestStatus=e.target.closest("[data-request-status]");if(vehicleStatus){updateVehicleStatus(vehicleStatus.dataset.vehicleStatus,vehicleStatus.value);return}if(requestStatus)updateRequestStatus(requestStatus.dataset.requestStatus,requestStatus.value)});'
          if old_events not in text and new_events not in text:
              raise SystemExit('Could not find vehicle detail event handlers')
          if old_events in text:
              text = text.replace(old_events, new_events, 1)

          Path('site/.pages-refresh').write_text('Refreshed GitHub Pages deployment on 2026-07-14 after public vehicle status dropdown update.\n', encoding='utf-8')
          page.write_text(text, encoding='utf-8')

          schema = Path('site/fleet-status-schema.sql')
          sql = schema.read_text(encoding='utf-8')
          addition = '''

create or replace function public.update_fleet_vehicle_status(
  vehicle_id uuid,
  new_status text,
  collar_number text
)
returns void
language plpgsql
security definer
set search_path = public
as $$
begin
  if new_status not in ('On-Road', 'Reported', 'Off-Road') then
    raise exception 'Invalid vehicle status';
  end if;

  if nullif(trim(collar_number), '') is null then
    raise exception 'Collar number is required';
  end if;

  update public.fleet_vehicles
  set status = new_status,
      status_updated_at = now(),
      status_updated_by = 'Collar ' || trim(collar_number)
  where id = vehicle_id;

  if not found then
    raise exception 'Vehicle not found';
  end if;
end;
$$;

grant execute on function public.update_fleet_vehicle_status(uuid, text, text) to anon, authenticated;
'''
          if 'update_fleet_vehicle_status' not in sql:
              sql = sql.rstrip() + addition
              schema.write_text(sql + '\n', encoding='utf-8')
          PY

      - name: Commit and push gh-pages change
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fleet-status.html fleet-status-schema.sql .pages-refresh
          git commit -m "Add public fleet status dropdown"
          git push origin gh-pages
name: Patch VRM suggestions

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-vrm-suggestions.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Add Fleet VRM suggestions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('site/index.html')
          text = path.read_text(encoding='utf-8')
          original = text

          def replace_once(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f'Missing expected text for {label}')
              text = text.replace(old, new, 1)

          if 'id="vehicle" autocomplete="off" list="fleetVrmOptions"' not in text:
              replace_once('<input id="vehicle" autocomplete="off" placeholder="Enter fleet vehicle VRM">','<input id="vehicle" autocomplete="off" list="fleetVrmOptions" placeholder="Enter fleet vehicle VRM">','individual VRM datalist')

          if 'id="checklistVrm" autocomplete="off" list="fleetVrmOptions"' not in text:
              replace_once('<input id="checklistVrm" autocomplete="off" placeholder="Enter fleet vehicle VRM">','<input id="checklistVrm" autocomplete="off" list="fleetVrmOptions" placeholder="Enter fleet vehicle VRM">','checklist VRM datalist')

          if '<datalist id="fleetVrmOptions"></datalist>' not in text:
              replace_once('<dialog id="adminDialog">','<datalist id="fleetVrmOptions"></datalist>\n<dialog id="adminDialog">','VRM datalist element')

          if 'fleetVehicles=[]' not in text:
              replace_once('itemRecords=[],requests=[],itemDrafts=[]','itemRecords=[],requests=[],fleetVehicles=[],itemDrafts=[]','fleet vehicle state')

          if 'fleetVrmOptions=$("#fleetVrmOptions")' not in text:
              replace_once('checklistNotes=$("#checklistNotes");','checklistNotes=$("#checklistNotes"),fleetVrmOptions=$("#fleetVrmOptions");','fleet VRM datalist reference')

          if 'async function loadFleetVehicles()' not in text:
              anchor = 'async function loadSettings(){'
              loader = 'async function loadFleetVehicles(){const result=await db.from("fleet_vehicles").select("vrm").order("sort_order").order("vrm");if(result.error){console.warn("Loading fleet vehicles",result.error);fleetVehicles=[];renderFleetVrmOptions();return}fleetVehicles=[...new Set(result.data.map(row=>formatVrm(row.vrm)).filter(Boolean))];renderFleetVrmOptions()}function renderFleetVrmOptions(){fleetVrmOptions.innerHTML=fleetVehicles.map(vrm=>`<option value="${escapeHtml(vrm)}"></option>`).join("")}\n'
              replace_once(anchor, loader + anchor, 'fleet vehicle loader')

          if 'await loadFleetVehicles();await loadSettings();' not in text:
              replace_once('await loadItems();await loadRequests();await loadSettings();renderItems();','await loadItems();await loadRequests();await loadFleetVehicles();await loadSettings();renderItems();','refresh fleet vehicles')

          if 'table:"fleet_vehicles"' not in text:
              replace_once('.on("postgres_changes",{event:"*",schema:"public",table:"app_settings"},()=>loadSettings()).subscribe();','.on("postgres_changes",{event:"*",schema:"public",table:"app_settings"},()=>loadSettings()).on("postgres_changes",{event:"*",schema:"public",table:"fleet_vehicles"},()=>loadFleetVehicles()).subscribe();','fleet vehicle live refresh')

          if text == original:
              raise SystemExit('No changes made')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit and push gh-pages change
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Suggest Fleet VRMs on request forms"
          git push origin gh-pages

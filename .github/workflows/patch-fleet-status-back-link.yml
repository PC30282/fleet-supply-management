name: Patch Fleet Status back link

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-fleet-status-back-link.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Return Supply Requests link to root URL
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('site/fleet-status.html')
          text = path.read_text(encoding='utf-8')
          old = '<a class="button" href="index.html">Supply Requests</a>'
          new = '<a class="button" href="./">Supply Requests</a>'
          if new in text:
              print('Supply Requests link already points at site root')
          elif old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          else:
              raise SystemExit('Supply Requests link not found')
          PY

      - name: Commit and push gh-pages change
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add fleet-status.html
            git commit -m "Point Fleet Status back link to site root"
            git push origin gh-pages
          fi

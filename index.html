<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fleet Supply Management</title>
  <style>
    :root{--ink:#202124;--muted:#62676f;--line:#d9dee4;--panel:#fff;--paper:#f6f7f2;--teal:#0f766e;--teal2:#dff4ef;--amber:#b45309;--amber2:#fff2cf;--red:#b42318;--red2:#ffe3df;--green:#177245;--green2:#ddf3e6;--charcoal:#2c3037;--shadow:0 16px 42px rgba(32,33,36,.09);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:light}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,rgba(15,118,110,.08),transparent 270px),var(--paper);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.app-header{position:sticky;top:0;z-index:20;background:rgba(246,247,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(217,222,228,.75)}.header-inner{max-width:1180px;margin:0 auto;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.badge-mark{width:52px;height:52px;border-radius:8px;display:grid;place-items:center;background:#fff;color:var(--charcoal);border:1px solid var(--line);box-shadow:0 6px 16px rgba(32,33,36,.08);flex:0 0 auto;overflow:hidden}.badge-mark img{width:46px;height:46px;object-fit:contain;display:block}.brand h1{margin:0;font-size:clamp(1.05rem,2vw,1.55rem);line-height:1.1;letter-spacing:0}.brand span{display:block;color:var(--muted);font-size:.86rem;margin-top:3px}.admin-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.admin-pill{display:inline-flex;align-items:center;gap:7px;padding:9px 11px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:.88rem;white-space:nowrap}.admin-pill.active{background:var(--green2);color:var(--green);border-color:#a7dfbd}.icon-button,.primary-button,.quiet-button,.danger-button{min-height:42px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:8px;font-weight:700;transition:transform .16s ease}.icon-button{width:42px;background:var(--panel);color:var(--ink);border:1px solid var(--line)}.primary-button{padding:0 15px;background:var(--teal);color:#fff;box-shadow:0 10px 22px rgba(15,118,110,.2)}.quiet-button{padding:0 13px;background:var(--panel);color:var(--ink);border:1px solid var(--line)}.danger-button{padding:0 13px;background:var(--red2);color:var(--red);border:1px solid #ffc8c0}.icon-button:hover,.primary-button:hover,.quiet-button:hover,.danger-button:hover{transform:translateY(-1px)}main{max-width:1180px;margin:0 auto;padding:20px 16px 42px}.summary-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:8px 0 20px}.metric{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 8px 24px rgba(32,33,36,.05)}.metric strong{display:block;font-size:1.55rem;line-height:1;margin-bottom:5px}.metric span{color:var(--muted);font-size:.84rem;font-weight:700}.tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:20px}.tab{min-height:54px;padding:9px;border-radius:8px;background:rgba(255,255,255,.72);border:1px solid var(--line);color:var(--ink);display:flex;align-items:center;justify-content:center;gap:9px;font-weight:800;text-align:center}.tab.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal);box-shadow:var(--shadow)}.layout{display:grid;grid-template-columns:minmax(320px,410px) minmax(0,1fr);gap:18px;align-items:start}.section-panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;box-shadow:var(--shadow)}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.section-title h2,.section-title h3{margin:0;font-size:1.05rem;letter-spacing:0}.section-title small{color:var(--muted);font-weight:800}.field{display:grid;gap:7px;margin-bottom:13px}.field[hidden],#customItemField[hidden]{display:none!important}label{color:var(--charcoal);font-size:.82rem;font-weight:800}input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:11px 12px;outline:none}textarea{resize:vertical;min-height:88px}input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,118,110,.14)}.form-grid{display:grid;grid-template-columns:1fr 104px;gap:10px}.warning{display:none;align-items:flex-start;gap:10px;border:1px solid #f0cf80;background:var(--amber2);color:#6f3a05;border-radius:8px;padding:11px;margin:2px 0 14px;font-weight:700;font-size:.9rem}.warning.show{display:flex}.filters{display:grid;grid-template-columns:1fr 160px;gap:10px;margin-bottom:14px}.request-list{display:grid;gap:10px}.request-card{background:var(--panel);border:1px solid var(--line);border-left:6px solid var(--teal);border-radius:8px;padding:14px;display:grid;gap:12px}.request-card[data-status="Ordered"]{border-left-color:var(--amber)}.request-card[data-status="Delivered"]{border-left-color:var(--green)}.request-card[data-status="Cancelled"]{border-left-color:var(--red)}.request-main{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start}.request-main h4{margin:0 0 5px;font-size:1rem;line-height:1.25;overflow-wrap:anywhere}.request-meta{color:var(--muted);font-size:.86rem;display:flex;flex-wrap:wrap;gap:6px 12px}.status{display:inline-flex;align-items:center;border-radius:999px;padding:7px 10px;font-weight:800;font-size:.78rem;white-space:nowrap}.status.made{background:var(--teal2);color:var(--teal)}.status.ordered{background:var(--amber2);color:var(--amber)}.status.delivered{background:var(--green2);color:var(--green)}.status.cancelled{background:var(--red2);color:var(--red)}.request-note{margin:0;color:var(--charcoal);line-height:1.45;overflow-wrap:anywhere}.manage-row{display:none;grid-template-columns:minmax(0,220px) auto;gap:9px;align-items:center}body.admin-on .manage-row{display:grid}.empty{border:1px dashed #b8c0c9;border-radius:8px;padding:22px;text-align:center;color:var(--muted);font-weight:700;background:rgba(255,255,255,.55)}dialog{border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:0;width:min(420px,calc(100vw - 28px))}dialog::backdrop{background:rgba(32,33,36,.35)}.dialog-body{padding:18px;display:grid;gap:12px}.dialog-body h3{margin:0}.dialog-actions{display:flex;justify-content:flex-end;gap:9px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;background:var(--charcoal);color:#fff;padding:12px 15px;border-radius:8px;font-weight:800;box-shadow:var(--shadow);transition:opacity .2s ease,transform .2s ease;z-index:40;max-width:calc(100vw - 24px);text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}svg{width:19px;height:19px;stroke-width:2.2;flex:0 0 auto}@media(max-width:840px){.header-inner{align-items:flex-start;flex-direction:column}.admin-wrap{width:100%;justify-content:space-between}.summary-strip{grid-template-columns:repeat(2,minmax(0,1fr))}.layout{grid-template-columns:1fr}}@media(max-width:560px){main{padding-inline:12px}.tabs{grid-template-columns:1fr}.tab{justify-content:flex-start;padding-inline:14px}.summary-strip{grid-template-columns:1fr 1fr}.metric{padding:12px}.form-grid,.filters,.request-main,.manage-row{grid-template-columns:1fr}.status{width:fit-content}.primary-button,.quiet-button,.danger-button{width:100%}}
  </style>
</head>
<body>
  <header class="app-header"><div class="header-inner"><div class="brand"><div class="badge-mark" aria-hidden="true"><img src="https://commons.wikimedia.org/wiki/Special:Redirect/file/Staffordshire%20Police%20logo.svg?width=96" alt=""></div><div><h1>Fleet Supply Management</h1><span>Tamworth Vehicle Supplies</span></div></div><div class="admin-wrap"><span class="admin-pill" id="accessState"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="11" width="16" height="9" rx="2"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg>View only</span><button class="icon-button" id="adminButton" title="Supervisor access" aria-label="Supervisor access"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15v2"></path><path d="M7 10V8a5 5 0 0 1 10 0v2"></path><rect x="5" y="10" width="14" height="10" rx="2"></rect></svg></button></div></div></header>
  <main><section class="summary-strip" aria-label="Dashboard totals"><div class="metric"><strong id="totalRequests">0</strong><span>Total requests</span></div><div class="metric"><strong id="madeRequests">0</strong><span>Pending</span></div><div class="metric"><strong id="orderedRequests">0</strong><span>Ordered</span></div><div class="metric"><strong id="deliveredRequests">0</strong><span>Delivered</span></div></section><nav class="tabs" aria-label="Supply sections"><button class="tab active" data-section="First aid Supplies"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4h2v6h6v2h-6v6h-2v-6H5v-2h6z"></path><rect x="3" y="3" width="18" height="18" rx="3"></rect></svg>First aid Supplies</button><button class="tab" data-section="Vehicle Equipment"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 17h14"></path><path d="M6 17l1-7h10l1 7"></path><path d="M8 10l2-4h4l2 4"></path><circle cx="8" cy="17" r="2"></circle><circle cx="16" cy="17" r="2"></circle></svg>Vehicle Equipment</button><button class="tab" data-section="Vehicle Maintenance"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.7 6.3a4 4 0 0 0-5 5L4 17v3h3l5.7-5.7a4 4 0 0 0 5-5l-2.4 2.4-3-3z"></path></svg>Vehicle Maintenance</button></nav><div class="layout"><section class="section-panel"><div class="section-title"><h2 id="formTitle">First aid Supplies</h2><small>14 day check</small></div><form id="requestForm"><div class="field"><label for="itemSelect">Item</label><select id="itemSelect" required></select></div><div class="field" id="customItemField" hidden><label for="customItem">Item name</label><input id="customItem" autocomplete="off" placeholder="Enter item name"></div><div class="form-grid"><div class="field"><label for="vehicle">Vehicle or area</label><input id="vehicle" autocomplete="off" placeholder="Fleet car, van, store room"></div><div class="field"><label for="quantity">Qty</label><input id="quantity" type="number" min="1" step="1" value="1" required></div></div><div class="field"><label for="requester">Collar number</label><input id="requester" autocomplete="off" placeholder="Collar number" required></div><div class="field"><label for="notes">Notes</label><textarea id="notes" placeholder="Reason, urgency, reference, or vehicle details"></textarea></div><div class="warning" id="duplicateWarning" role="alert"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10.3 3.4 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.4a2 2 0 0 0-3.4 0z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg><span id="duplicateText"></span></div><button class="primary-button" type="submit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>Submit request</button></form></section><section><div class="section-title"><h3>Request dashboard</h3><small id="visibleCount">0 shown</small></div><div class="filters"><input id="searchInput" placeholder="Search item, vehicle, or collar number" autocomplete="off"><select id="statusFilter"><option value="All">All status</option><option value="Pending">Pending</option><option value="Ordered">Ordered</option><option value="Delivered">Delivered</option><option value="Cancelled">Cancelled</option></select></div><div class="request-list" id="requestList"></div></section></div></main>
  <dialog id="adminDialog"><form method="dialog" class="dialog-body" id="adminForm"><h3>Supervisor access</h3><div class="field"><label for="accessCode">Access code</label><input id="accessCode" type="password" inputmode="numeric" autocomplete="off"></div><div class="dialog-actions"><button class="quiet-button" value="cancel" type="button" id="cancelAdmin">Cancel</button><button class="primary-button" value="confirm">Unlock</button></div></form></dialog><div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    const ADMIN_CODE="1976",RECENT_DAYS=14,STORAGE_KEY="fleet-supply-requests-v1";
    const sections={"First aid Supplies":["First aid kit","Trauma dressing","Sterile gloves","Plasters","Eye wash","Burn dressing","CPR face shield","Other first aid item"],"Vehicle Equipment":["Torch","Traffic cones","High visibility vest","Evidence bags","Scene tape","Blanket","Window hammer","Other vehicle equipment"],"Vehicle Maintenance":["Screen wash","Engine oil","Wiper blades","Tyre pressure check","Bulb replacement","Fuel card issue","Vehicle clean","Other maintenance item"]};
    const sampleRequests=[{id:crypto.randomUUID(),section:"First aid Supplies",item:"Sterile gloves",vehicle:"Store room",quantity:4,requester:"30282",notes:"Medium gloves running low.",status:"Pending",createdAt:new Date(Date.now()-2*86400000).toISOString()},{id:crypto.randomUUID(),section:"Vehicle Equipment",item:"Traffic cones",vehicle:"Response van 2",quantity:2,requester:"41512",notes:"Two damaged during late shift.",status:"Ordered",createdAt:new Date(Date.now()-5*86400000).toISOString()},{id:crypto.randomUUID(),section:"Vehicle Maintenance",item:"Screen wash",vehicle:"Fleet bay",quantity:6,requester:"18409",notes:"Winter mix preferred.",status:"Delivered",createdAt:new Date(Date.now()-9*86400000).toISOString()}];
    let currentSection="First aid Supplies",requests=loadRequests(),adminUnlocked=false,lastSubmittedDuplicate=null;
    const itemSelect=document.querySelector("#itemSelect"),customItemField=document.querySelector("#customItemField"),customItem=document.querySelector("#customItem"),requestForm=document.querySelector("#requestForm"),requestList=document.querySelector("#requestList"),duplicateWarning=document.querySelector("#duplicateWarning"),duplicateText=document.querySelector("#duplicateText"),formTitle=document.querySelector("#formTitle"),searchInput=document.querySelector("#searchInput"),statusFilter=document.querySelector("#statusFilter"),adminDialog=document.querySelector("#adminDialog"),adminForm=document.querySelector("#adminForm"),adminButton=document.querySelector("#adminButton"),accessState=document.querySelector("#accessState"),toast=document.querySelector("#toast");
    function normaliseStatus(status){return {"Request made":"Pending","Request ordered":"Ordered"}[status]||status}function loadRequests(){const stored=localStorage.getItem(STORAGE_KEY);if(!stored){localStorage.setItem(STORAGE_KEY,JSON.stringify(sampleRequests));return sampleRequests}try{const parsed=JSON.parse(stored).map(request=>({...request,status:normaliseStatus(request.status)}));localStorage.setItem(STORAGE_KEY,JSON.stringify(parsed));return parsed}catch{return[]}}function saveRequests(){localStorage.setItem(STORAGE_KEY,JSON.stringify(requests))}function escapeHtml(value){return String(value).replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))}function formatDate(value){return new Intl.DateTimeFormat("en-GB",{day:"2-digit",month:"short",year:"numeric"}).format(new Date(value))}function statusClass(status){return{Pending:"made",Ordered:"ordered",Delivered:"delivered",Cancelled:"cancelled"}[status]||"made"}function showToast(message){toast.textContent=message;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),2400)}
    function renderItems(){itemSelect.innerHTML=`<option value="">Select an item</option>`+sections[currentSection].map(item=>`<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join("");updateCustomItem();clearDuplicateWarning()}function updateCustomItem(){const isOther=itemSelect.value.toLowerCase().startsWith("other");customItemField.hidden=!isOther;customItem.required=isOther;if(!isOther)customItem.value=""}function getSelectedItem(){const selected=itemSelect.value;if(!selected)return"";return selected.toLowerCase().startsWith("other")?customItem.value.trim():selected}function recentDuplicate(){const item=getSelectedItem().toLowerCase();if(!item)return null;const cutoff=Date.now()-RECENT_DAYS*86400000;return requests.find(request=>request.section===currentSection&&request.item.toLowerCase()===item&&request.status!=="Delivered"&&request.status!=="Cancelled"&&new Date(request.createdAt).getTime()>=cutoff)}function clearDuplicateWarning(){lastSubmittedDuplicate=null;duplicateWarning.classList.remove("show");duplicateText.textContent=""}function showDuplicateWarning(match,submitted=false){duplicateText.textContent=`${submitted?"Request saved, but ":""}${match.item} is already on the dashboard: ${match.status}, qty ${match.quantity}, ${match.vehicle||"no vehicle"}, collar ${match.requester}, ${formatDate(match.createdAt)}.`;duplicateWarning.classList.add("show")}function updateDuplicateWarning(){const match=recentDuplicate();if(!match){clearDuplicateWarning();return}showDuplicateWarning(match,false)}
    function setSection(section){currentSection=section;document.querySelectorAll(".tab").forEach(tab=>tab.classList.toggle("active",tab.dataset.section===section));formTitle.textContent=section;renderItems();renderDashboard()}function renderMetrics(){const live=requests.filter(request=>request.status!=="Cancelled");document.querySelector("#totalRequests").textContent=live.length;document.querySelector("#madeRequests").textContent=live.filter(request=>request.status==="Pending").length;document.querySelector("#orderedRequests").textContent=live.filter(request=>request.status==="Ordered").length;document.querySelector("#deliveredRequests").textContent=live.filter(request=>request.status==="Delivered").length}
    function renderDashboard(){renderMetrics();const term=searchInput.value.trim().toLowerCase(),status=statusFilter.value;const visible=requests.filter(request=>request.section===currentSection).filter(request=>status==="All"||request.status===status).filter(request=>!term||[request.item,request.vehicle,request.requester,request.notes].join(" ").toLowerCase().includes(term)).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));document.querySelector("#visibleCount").textContent=`${visible.length} shown`;if(!visible.length){requestList.innerHTML=`<div class="empty">No requests found.</div>`;return}requestList.innerHTML=visible.map(request=>`<article class="request-card" data-status="${escapeHtml(request.status)}"><div class="request-main"><div><h4>${escapeHtml(request.item)}</h4><div class="request-meta"><span>Qty ${escapeHtml(request.quantity)}</span><span>${escapeHtml(request.vehicle||"No vehicle")}</span><span>Collar ${escapeHtml(request.requester)}</span><span>${formatDate(request.createdAt)}</span></div></div><span class="status ${statusClass(request.status)}">${escapeHtml(request.status)}</span></div>${request.notes?`<p class="request-note">${escapeHtml(request.notes)}</p>`:""}<div class="manage-row"><select data-status-for="${escapeHtml(request.id)}" aria-label="Change status for ${escapeHtml(request.item)}">${["Pending","Ordered","Delivered","Cancelled"].map(option=>`<option value="${option}" ${option===request.status?"selected":""}>${option}</option>`).join("")}</select><button class="danger-button" data-delete="${escapeHtml(request.id)}" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>Delete</button></div></article>`).join("")}
    document.querySelectorAll(".tab").forEach(tab=>tab.addEventListener("click",()=>setSection(tab.dataset.section)));itemSelect.addEventListener("change",()=>{updateCustomItem();updateDuplicateWarning()});customItem.addEventListener("input",updateDuplicateWarning);searchInput.addEventListener("input",renderDashboard);statusFilter.addEventListener("change",renderDashboard);
    requestForm.addEventListener("submit",event=>{event.preventDefault();const item=getSelectedItem();if(!item)return;const duplicate=recentDuplicate();const request={id:crypto.randomUUID(),section:currentSection,item,vehicle:document.querySelector("#vehicle").value.trim(),quantity:Number(document.querySelector("#quantity").value)||1,requester:document.querySelector("#requester").value.trim(),notes:document.querySelector("#notes").value.trim(),status:"Pending",createdAt:new Date().toISOString()};requests.push(request);saveRequests();if(duplicate){searchInput.value="";statusFilter.value="All"}requestForm.reset();document.querySelector("#quantity").value=1;renderItems();renderDashboard();if(duplicate)showDuplicateWarning(duplicate,true);showToast(duplicate?"Request saved. Recent matching request shown above.":"Request saved.")});
    requestList.addEventListener("change",event=>{const id=event.target.dataset.statusFor;if(!id||!adminUnlocked)return;const request=requests.find(item=>item.id===id);if(!request)return;request.status=event.target.value;saveRequests();renderDashboard();updateDuplicateWarning();showToast("Status updated.")});requestList.addEventListener("click",event=>{const button=event.target.closest("[data-delete]");if(!button||!adminUnlocked)return;const request=requests.find(item=>item.id===button.dataset.delete);if(!request)return;if(!confirm(`Delete ${request.item}?`))return;requests=requests.filter(item=>item.id!==request.id);saveRequests();clearDuplicateWarning();renderDashboard();showToast("Request deleted.")});
    adminButton.addEventListener("click",()=>{if(adminUnlocked){adminUnlocked=false;document.body.classList.remove("admin-on");accessState.classList.remove("active");accessState.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="11" width="16" height="9" rx="2"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg> View only`;showToast("Management locked.");return}adminDialog.showModal();document.querySelector("#accessCode").focus()});document.querySelector("#cancelAdmin").addEventListener("click",()=>adminDialog.close());adminForm.addEventListener("submit",event=>{event.preventDefault();const code=document.querySelector("#accessCode").value;if(code!==ADMIN_CODE){showToast("Access code not recognised.");return}adminUnlocked=true;document.body.classList.add("admin-on");accessState.classList.add("active");accessState.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 6 9 17l-5-5"></path></svg> Management`;document.querySelector("#accessCode").value="";adminDialog.close();showToast("Management unlocked.")});
    renderItems();renderDashboard();
  </script>
</body>
</html>

    let currentSection="First aid Supplies",itemRecords=[],requests=[],adminUnlocked=false,refreshing=false,supervisorUser=null,namePromptOpen=false,supportsRequiredQuantity=true;
    const itemSelect=document.querySelector("#itemSelect"),itemGuidance=document.querySelector("#itemGuidance"),customItemField=document.querySelector("#customItemField"),customItem=document.querySelector("#customItem"),requestForm=document.querySelector("#requestForm"),requestList=document.querySelector("#requestList"),duplicateWarning=document.querySelector("#duplicateWarning"),duplicateText=document.querySelector("#duplicateText"),formTitle=document.querySelector("#formTitle"),searchInput=document.querySelector("#searchInput"),statusFilter=document.querySelector("#statusFilter"),adminDialog=document.querySelector("#adminDialog"),adminForm=document.querySelector("#adminForm"),adminButton=document.querySelector("#adminButton"),accessState=document.querySelector("#accessState"),toast=document.querySelector("#toast"),newItemInput=document.querySelector("#newItemInput"),addItemButton=document.querySelector("#addItemButton"),managedItemList=document.querySelector("#managedItemList"),itemManagerNote=document.querySelector("#itemManagerNote"),syncState=document.querySelector("#syncState"),vehicleInput=document.querySelector("#vehicle"),vehicleField=document.querySelector("#vehicleField"),vehicleLabel=document.querySelector("label[for='vehicle']"),clearRequestButton=document.querySelector("#clearRequestButton"),supervisorEmail=document.querySelector("#supervisorEmail"),supervisorPassword=document.querySelector("#supervisorPassword");

    function updateVehicleRequirement(){const needsVrm=currentSection==="Vehicle Equipment";vehicleField.hidden=!needsVrm;vehicleInput.required=needsVrm;if(!needsVrm)vehicleInput.value="";vehicleLabel.textContent="Fleet vehicle VRM";vehicleInput.placeholder="Enter fleet vehicle VRM"}
    function clearRequestForm(){requestForm.reset();document.querySelector("#quantity").value=1;updateVehicleRequirement();renderItems();clearDuplicateWarning();showToast("Request cleared.")}
    function updateCustomItem(){const isOther=itemSelect.value.toLowerCase().startsWith("other");customItemField.hidden=!isOther;customItem.required=isOther;if(!isOther)customItem.value="";renderItemGuidance()}function getSelectedItem(){const selected=itemSelect.value;if(!selected)return"";return selected.toLowerCase().startsWith("other")?customItem.value.trim():selected}
    function normaliseVrm(value){return String(value||"").replace(/\s+/g,"").toLowerCase()}function formatVrm(value){const clean=String(value||"").replace(/\s+/g,"").toUpperCase();return clean.length>4?`${clean.slice(0,4)} ${clean.slice(4)}`:clean}function displayVehicle(request){if(!request.vehicle)return"No vehicle";return request.section==="Vehicle Equipment"?formatVrm(request.vehicle):request.vehicle}function recentDuplicate(){const item=getSelectedItem().toLowerCase();if(!item)return null;const cutoff=Date.now()-RECENT_DAYS*86400000;const currentVrm=normaliseVrm(vehicleInput.value);return requests.find(request=>{const sameItem=request.section===currentSection&&request.item.toLowerCase()===item;const sameVehicle=currentSection!=="Vehicle Equipment"||normaliseVrm(request.vehicle)===currentVrm;const active=request.status!=="Delivered"&&request.status!=="Cancelled";const recent=new Date(request.created_at).getTime()>=cutoff;return sameItem&&sameVehicle&&active&&recent})}function clearDuplicateWarning(){duplicateWarning.classList.remove("show");duplicateText.textContent=""}function showDuplicateWarning(item,submitted=false){const scope=currentSection==="Vehicle Equipment"?" for this VRM":"";duplicateText.textContent=`${submitted?"Request saved. ":""}${item} has recently been requested or ordered${scope}. Please check the dashboard before submitting a duplicate.`;duplicateWarning.classList.add("show")}function updateDuplicateWarning(){const match=recentDuplicate();if(!match){clearDuplicateWarning();return}showDuplicateWarning(match.item,false)}
    function setSection(section){currentSection=section;document.querySelectorAll(".tab").forEach(tab=>tab.classList.toggle("active",tab.dataset.section===section));formTitle.textContent=section;updateVehicleRequirement();renderItems();renderManagedItems();renderDashboard()}function renderMetrics(){const live=requests.filter(request=>request.status!=="Cancelled");document.querySelector("#totalRequests").textContent=live.length;document.querySelector("#madeRequests").textContent=live.filter(request=>request.status==="Pending").length;document.querySelector("#orderedRequests").textContent=live.filter(request=>request.status==="Ordered").length;document.querySelector("#deliveredRequests").textContent=live.filter(request=>request.status==="Delivered").length}
    function renderDashboard(){renderMetrics();const term=searchInput.value.trim().toLowerCase(),status=statusFilter.value;const visible=requests.filter(request=>request.section===currentSection).filter(request=>status==="All"||request.status===status).filter(request=>!term||[request.item,request.vehicle,request.requester,request.notes].join(" ").toLowerCase().includes(term)).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));document.querySelector("#visibleCount").textContent=`${visible.length} shown`;if(!visible.length){requestList.innerHTML=`<div class="empty">No requests found.</div>`;return}requestList.innerHTML=visible.map(request=>`<article class="request-card" data-status="${escapeHtml(request.status)}"><div class="request-main"><div><h4>${escapeHtml(request.item)}</h4><div class="request-meta"><span>Qty ${escapeHtml(request.quantity)}</span><span>${escapeHtml(displayVehicle(request))}</span><span>Collar ${escapeHtml(request.requester)}</span><span>${formatDate(request.created_at)}</span></div></div><span class="status ${statusClass(request.status)}">${escapeHtml(request.status)}</span></div>${request.notes?`<p class="request-note">${escapeHtml(request.notes)}</p>`:""}<div class="manage-row"><select data-status-for="${escapeHtml(request.id)}" aria-label="Change status for ${escapeHtml(request.item)}">${["Pending","Ordered","Delivered","Cancelled"].map(option=>`<option value="${option}" ${option===request.status?"selected":""}>${option}</option>`).join("")}</select><button class="danger-button" data-delete="${escapeHtml(request.id)}" type="button">Delete</button></div></article>`).join("")}
    async function addManagedItem(){if(!adminUnlocked){showToast("Supervisor login required.");return}const name=newItemInput.value.trim();if(!name)return;const items=sectionItems(currentSection);if(items.some(item=>item.name.toLowerCase()===name.toLowerCase())){showToast("That item is already listed.");return}const row={section:currentSection,name,sort_order:items.length};if(supportsRequiredQuantity&&needsRequirement(currentSection))row.required_quantity=null;await checkError(await db.from("order_items").insert(row),"Adding item");newItemInput.value="";await refreshAll(true);showToast("Item added.")}async function removeManagedItem(id){if(!adminUnlocked){showToast("Supervisor login required.");return}const item=itemRecords.find(row=>row.id===id);if(!item)return;if(!confirm(`Remove ${item.name} from ${currentSection}?`))return;await checkError(await db.from("order_items").delete().eq("id",id),"Removing item");await refreshAll(true);showToast("Item removed.")}async function moveManagedItem(id,direction){if(!adminUnlocked){showToast("Supervisor login required.");return}const items=sectionItems(currentSection);const index=items.findIndex(item=>item.id===id);const target=direction==="up"?index-1:index+1;if(index<0||target<0||target>=items.length)return;const current=items[index],swap=items[target];await checkError(await db.from("order_items").update({sort_order:swap.sort_order}).eq("id",current.id),"Moving item");await checkError(await db.from("order_items").update({sort_order:current.sort_order}).eq("id",swap.id),"Moving item");await refreshAll(true);showToast("Item order updated.")}async function updateRequiredAmount(id,value){if(!adminUnlocked||!supportsRequiredQuantity)return;const clean=value===""?null:Math.max(0,Number(value)||0);await checkError(await db.from("order_items").update({required_quantity:clean}).eq("id",id),"Updating required amount");await refreshAll(true);showToast("Required amount updated.")}
    document.querySelectorAll(".tab").forEach(tab=>tab.addEventListener("click",()=>setSection(tab.dataset.section)));itemSelect.addEventListener("change",()=>{updateCustomItem();updateDuplicateWarning()});vehicleInput.addEventListener("input",updateDuplicateWarning);customItem.addEventListener("input",()=>{renderItemGuidance();updateDuplicateWarning()});clearRequestButton.addEventListener("click",clearRequestForm);searchInput.addEventListener("input",renderDashboard);statusFilter.addEventListener("change",renderDashboard);addItemButton.addEventListener("click",()=>addManagedItem());newItemInput.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();addManagedItem()}});managedItemList.addEventListener("click",event=>{const removeButton=event.target.closest("[data-remove-item]");if(removeButton){removeManagedItem(removeButton.dataset.removeItem);return}const moveButton=event.target.closest("[data-move-item]");if(moveButton)moveManagedItem(moveButton.dataset.moveItem,moveButton.dataset.direction)});managedItemList.addEventListener("change",event=>{const input=event.target.closest("[data-required-for]");if(input)updateRequiredAmount(input.dataset.requiredFor,input.value)});
    requestForm.addEventListener("submit",async event=>{event.preventDefault();const item=getSelectedItem();if(!item)return;const duplicate=recentDuplicate();const payload={section:currentSection,item,vehicle:currentSection==="Vehicle Equipment"?formatVrm(vehicleInput.value):"",quantity:Number(document.querySelector("#quantity").value)||1,requester:document.querySelector("#requester").value.trim(),notes:document.querySelector("#notes").value.trim(),status:"Pending"};await checkError(await db.from("requests").insert(payload),"Saving request");if(duplicate){searchInput.value="";statusFilter.value="All"}requestForm.reset();document.querySelector("#quantity").value=1;updateVehicleRequirement();await refreshAll(true);if(duplicate)showDuplicateWarning(duplicate.item,true);showToast(duplicate?"Request saved. Please check the dashboard for the recent matching item.":"Request saved.")});
    requestList.addEventListener("change",async event=>{const id=event.target.dataset.statusFor;if(!id||!adminUnlocked)return;await checkError(await db.from("requests").update({status:event.target.value}).eq("id",id),"Updating status");await refreshAll(true);showToast("Status updated.")});requestList.addEventListener("click",async event=>{const button=event.target.closest("[data-delete]");if(!button||!adminUnlocked)return;const request=requests.find(item=>item.id===button.dataset.delete);if(!request)return;if(!confirm(`Delete ${request.item}?`))return;await checkError(await db.from("requests").delete().eq("id",request.id),"Deleting request");clearDuplicateWarning();await refreshAll(true);showToast("Request deleted.")});
    adminButton.addEventListener("click",async()=>{if(adminUnlocked){await db.auth.signOut();showToast("Signed out.");return}adminDialog.showModal();supervisorEmail.focus()});document.querySelector("#cancelAdmin").addEventListener("click",()=>adminDialog.close());adminForm.addEventListener("submit",async event=>{event.preventDefault();const email=supervisorEmail.value.trim();const password=supervisorPassword.value;if(!email||!password)return;const {data,error}=await db.auth.signInWithPassword({email,password});if(error){showToast("Login failed. Check email and password.");return}supervisorPassword.value="";adminDialog.close();setSupervisor(data.user);requestSupervisorFirstName(data.user);showToast("Supervisor signed in.")});
    db.auth.getSession().then(({data})=>{const user=data.session?.user||null;setSupervisor(user);requestSupervisorFirstName(user)});db.auth.onAuthStateChange((_event,session)=>{const user=session?.user||null;setSupervisor(user);requestSupervisorFirstName(user)});
    db.channel("fleet-supply-sync").on("postgres_changes",{event:"*",schema:"public",table:"requests"},()=>refreshAll(true)).on("postgres_changes",{event:"*",schema:"public",table:"order_items"},()=>refreshAll(true)).subscribe();
    updateVehicleRequirement();refreshAll();setInterval(()=>refreshAll(true),120000);
  </script>
</body>

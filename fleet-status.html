function renderFleetList(){const list=filteredVehicles();fleetList.innerHTML=list.map(v=>`<button class="vehicle-button ${v.id===selectedId?"active":""}" data-status="${escapeHtml(v.status)}" data-select="${escapeHtml(v.id)}" type="button"><div class="vehicle-top"><strong>${escapeHtml(formatVrm(v.vrm))}</strong><span class="pill ${statusClass(v.status)}">${escapeHtml(v.status)}</span></div><div class="vehicle-meta"><span>${escapeHtml(v.make)} ${escapeHtml(v.model)}</span><span>${escapeHtml(v.vehicle_type)}</span>${checklistBadge(v)}</div></button>`).join("")||`<div class="empty">No fleet vehicles found.</div>`}
function requestStatusOptions(status){return ["Pending","Ordered","Delivered","Cancelled"].map(option=>`<option value="${option}" ${option===status?"selected":""}>${option}</option>`).join("")}function vehicleStatusOptions(status){return ["On-Road","Reported","Off-Road"].map(option=>`<option value="${option}" ${option===status?"selected":""}>${option}</option>`).join("")}
function renderDetail(){const v=selectedVehicle();if(!v){vehicleDetail.innerHTML=`<div class="empty">Select or add a fleet vehicle.</div>`;return}const reqs=vehicleRequests(v),history=vehicleChecklists(v),check=history[0]||null,checkState=checklistState(v);vehicleDetail.innerHTML=`<div class="detail-head"><div class="detail-title"><div><h2>${escapeHtml(formatVrm(v.vrm))}</h2><p>${escapeHtml(v.make)} ${escapeHtml(v.model)} - ${escapeHtml(v.vehicle_type)}</p></div><select class="status-select ${statusClass(v.status)}" data-vehicle-status="${escapeHtml(v.id)}" aria-label="Vehicle status">${vehicleStatusOptions(v.status)}</select></div></div><div class="detail-grid"><div class="fact ${checkState.className}"><span>Last checklist</span><strong>${escapeHtml(formatDate(check?.completed_at))}</strong><small>${escapeHtml(checkState.label)}</small>${check?.completed_by?`<small>By ${escapeHtml(check.completed_by)}</small>`:""}</div><div class="fact"><span>Last status update</span><strong>${escapeHtml(formatDate(v.status_updated_at))}</strong>${v.status_updated_by?`<small>By ${escapeHtml(v.status_updated_by)}</small>`:""}</div><div class="fact"><span>Make and model</span><strong>${escapeHtml(v.make)} ${escapeHtml(v.model)}</strong></div><div class="fact"><span>Vehicle type</span><strong>${escapeHtml(v.vehicle_type)}</strong></div></div><div class="section-title"><h3>Checklist history</h3><small>${history.length} shown</small></div><div class="history-list">${history.map(c=>`<article class="history-card"><div><strong>${escapeHtml(formatDate(c.completed_at))}</strong><small>By ${escapeHtml(c.completed_by||"Unknown")}</small></div><button class="danger-button" data-delete-checklist="${escapeHtml(c.id)}" type="button">Delete</button>${c.notes?`<p>${escapeHtml(c.notes)}</p>`:""}<p>${escapeHtml(checklistRequestSummary(v,c))}</p></article>`).join("")||`<div class="empty">No checklists recorded for this vehicle.</div>`}</div><div class="section-title" style="margin-top:16px"><h3>Requested items</h3><small>${reqs.length} shown</small></div><div class="request-list">${reqs.map(r=>`<article class="request-card" data-status="${escapeHtml(r.status)}"><h4>${escapeHtml(r.item)}</h4><p>Qty ${escapeHtml(r.quantity)} - ${escapeHtml(r.status)} - Collar ${escapeHtml(r.requester)} - ${escapeHtml(formatDate(r.created_at))}</p>${r.notes?`<p>${escapeHtml(r.notes)}</p>`:""}<div class="request-manage"><select data-request-status="${escapeHtml(r.id)}">${requestStatusOptions(r.status)}</select><button class="danger-button" data-delete-request="${escapeHtml(r.id)}" type="button">Delete</button></div></article>`).join("")||`<div class="empty">No requests recorded for this vehicle.</div>`}</div><section class="vehicle-edit-panel"><div class="section-title"><h3>Edit vehicle details</h3><small>Supervisor</small></div><div class="form-grid"><div class="field"><label for="editVehicleVrm">VRM</label><input id="editVehicleVrm" value="${escapeHtml(formatVrm(v.vrm))}" autocomplete="off"></div><div class="field"><label for="editVehicleType">Vehicle type</label><select id="editVehicleType"><option ${v.vehicle_type==="Marked"?"selected":""}>Marked</option><option ${v.vehicle_type==="Unmarked"?"selected":""}>Unmarked</option></select></div></div><div class="form-grid"><div class="field"><label for="editVehicleMake">Make</label><input id="editVehicleMake" value="${escapeHtml(v.make)}" autocomplete="off"></div><div class="field"><label for="editVehicleModel">Model</label><input id="editVehicleModel" value="${escapeHtml(v.model)}" autocomplete="off"></div></div><div class="form-actions"><p class="vehicle-edit-note">Changes are only saved when you press Save.</p><button class="primary-button" data-save-vehicle-details="${escapeHtml(v.id)}" type="button">Save vehicle details</button></div></section>`}
function resetDrafts(){draftVehicles=vehicles.map(v=>({...v,delete:false}));draftDirty=false}function markDraftDirty(){draftDirty=true;managerNote.textContent="Unsaved changes. Drag more, then save the order."}
function renderManager(){if(!adminUnlocked){managerList.innerHTML="";return}managerList.innerHTML=draftVehicles.filter(v=>!v.delete).map(v=>`<div class="manager-row" draggable="true" data-draft-id="${escapeHtml(v.id)}"><button class="drag-handle" type="button" aria-label="Drag ${escapeHtml(formatVrm(v.vrm))}">↕</button><strong>${escapeHtml(formatVrm(v.vrm))}</strong><small>${escapeHtml(v.make)} ${escapeHtml(v.model)} - ${escapeHtml(v.vehicle_type)} - ${escapeHtml(v.status)}</small><button class="danger-button" type="button" data-remove-vehicle="${escapeHtml(v.id)}">Remove</button></div>`).join("")||`<div class="empty">No vehicles to manage.</div>`;managerNote.textContent=draftDirty?"Unsaved changes. Drag more, then save the order.":"Drag vehicles into order, then save."}
function render(){document.body.classList.toggle("admin-on",adminUnlocked);renderMetrics();renderFleetList();renderDetail();renderManager()}async function loadSupervisorProfile(){supervisorCollar="";if(!supervisorUser)return;try{const {data,error}=await db.from("supervisor_profiles").select("collar_number").eq("user_id",supervisorUser.id).maybeSingle();if(error)throw error;supervisorCollar=data?.collar_number||""}catch(error){console.error("Loading supervisor profile",error)}}async function saveSupervisorCollar(collar){if(!supervisorUser)return;await check(await db.from("supervisor_profiles").upsert({user_id:supervisorUser.id,collar_number:collar,updated_at:new Date().toISOString()}),"Saving supervisor collar");supervisorCollar=collar}async function setSupervisor(user){supervisorUser=user||null;adminUnlocked=Boolean(user);if(!adminUnlocked)supervisorCollar="";accessState.classList.toggle("on",adminUnlocked);accessState.classList.toggle("neutral",!adminUnlocked);if(adminUnlocked){accessState.textContent=`Supervisor: ${supervisorName()}`;adminButton.innerHTML=unlockIcon;adminButton.title="Sign out";await loadSupervisorProfile()}else{accessState.textContent="View only";adminButton.innerHTML=lockIcon;adminButton.title="Supervisor login"}render()}
async function addVehicle(){if(!adminUnlocked){showToast("Supervisor login required.");return}const vrm=formatVrm(newVrm.value);if(!vrm){showToast("VRM is required.");return}const row={vrm,make:newMake.value.trim(),model:newModel.value.trim(),vehicle_type:newType.value,status:"On-Road",sort_order:vehicles.length,status_updated_at:new Date().toISOString(),status_updated_by:supervisorName()};await check(await db.from("fleet_vehicles").insert(row),"Adding vehicle");newVrm.value="";newMake.value="";newModel.value="";await loadData();showToast("Vehicle added.")}
async function saveOrder(){if(!adminUnlocked)return;const active=draftVehicles.filter(v=>!v.delete);for(const v of draftVehicles.filter(v=>v.delete))await check(await db.from("fleet_vehicles").delete().eq("id",v.id),"Removing vehicle");for(let i=0;i<active.length;i++)await check(await db.from("fleet_vehicles").update({sort_order:i}).eq("id",active[i].id),"Saving order");draftDirty=false;await loadData();showToast("Fleet order saved.")}async function saveVehicleDetails(id){if(!adminUnlocked){showToast("Supervisor login required.");return}const v=vehicles.find(x=>x.id===id);if(!v)return;const oldVrm=formatVrm(v.vrm),newVrm=formatVrm($("#editVehicleVrm")?.value||"");if(!newVrm){showToast("VRM is required.");return}const row={vrm:newVrm,make:$("#editVehicleMake")?.value.trim()||"",model:$("#editVehicleModel")?.value.trim()||"",vehicle_type:$("#editVehicleType")?.value||"Marked"};try{showToast("Saving vehicle details...");await check(await db.from("fleet_vehicles").update(row).eq("id",id),"Saving vehicle details");const matching=requests.filter(r=>normaliseVrm(r.vehicle)===normaliseVrm(oldVrm));for(const request of matching)await check(await db.from("requests").update({vehicle:newVrm}).eq("id",request.id),"Updating vehicle requests");await check(await db.from("fleet_checklists").update({vehicle_vrm:newVrm}).eq("vehicle_id",id),"Updating vehicle checklists");await loadData();showToast("Vehicle details saved.")}catch(error){console.error(error);const message=String(error?.message||"");if(message.includes("duplicate")||message.includes("unique")){showToast("That VRM already exists in the fleet list.")}else{showToast("Vehicle details could not be saved.")}}}
async function updateVehicleStatus(id,status){const v=vehicles.find(x=>x.id===id);if(!v)return;const previous=v.status;let clean=supervisorUser&&supervisorCollar?supervisorCollar:"";if(!clean){const promptText=supervisorUser?`Enter your collar number. It will be saved to your login for future status changes:`:`Enter your collar number to mark ${formatVrm(v.vrm)} as ${status}:`;const collar=prompt(promptText);if(!collar||!collar.trim()){render();return}clean=collar.trim().replace(/[^0-9A-Za-z]/g,"");if(!clean){render();showToast("Collar number is required.");return}if(supervisorUser){try{await saveSupervisorCollar(clean);showToast("Collar number saved to your login.")}catch(error){console.error(error);showToast("Collar could not be saved, but the status update will still be tried.")}}}try{showToast("Saving vehicle status...");await check(await db.rpc("update_fleet_vehicle_status",{vehicle_id:id,new_status:status,collar_number:clean}),"Updating status");await loadData();showToast("Vehicle status updated.")}catch(error){console.error(error);const message=String(error?.message||"");if(message.includes("supervisor_profiles")){showToast("Database update needed: run the latest fleet-status-schema.sql in Supabase.")}else if(message.includes("update_fleet_vehicle_status")||message.includes("function")||message.includes("schema cache")){showToast("Database update needed: run the latest fleet-status-schema.sql in Supabase.")}else{showToast("Status could not be saved. Please try again.")}v.status=previous;render()}}async function recordChecklist(id){const v=vehicles.find(x=>x.id===id),by=$("#checklistBy")?.value.trim()||supervisorName();if(!v)return;await check(await db.from("fleet_checklists").insert({vehicle_id:v.id,vehicle_vrm:formatVrm(v.vrm),completed_by:by}),"Recording checklist");await loadData();showToast("Checklist recorded.")}async function deleteChecklist(id){if(!adminUnlocked)return;if(!confirm("Delete this checklist record?"))return;await check(await db.from("fleet_checklists").delete().eq("id",id),"Deleting checklist");await loadData();showToast("Checklist deleted.")}async function updateRequestStatus(id,status){if(!adminUnlocked)return;await check(await db.from("requests").update({status}).eq("id",id),"Updating request");await loadData();showToast("Request status updated.")}async function deleteRequest(id){if(!adminUnlocked)return;const request=requests.find(r=>r.id===id);if(!confirm(`Delete ${request?.item||"this request"}?`))return;await check(await db.from("requests").delete().eq("id",id),"Deleting request");await loadData();showToast("Request deleted.")}
function reorderDraft(sourceId,targetId){if(sourceId===targetId)return;const from=draftVehicles.findIndex(v=>v.id===sourceId),to=draftVehicles.findIndex(v=>v.id===targetId);if(from<0||to<0)return;const [moved]=draftVehicles.splice(from,1);draftVehicles.splice(to,0,moved);markDraftDirty();renderManager()}function removeVehicle(id){const v=draftVehicles.find(x=>x.id===id);if(!v)return;v.delete=true;markDraftDirty();renderManager()}
fleetList.addEventListener("click",e=>{const btn=e.target.closest("[data-select]");if(!btn)return;selectedId=btn.dataset.select;render()});searchInput.addEventListener("input",renderFleetList);statusFilter.addEventListener("change",renderFleetList);addVehicleButton.addEventListener("click",addVehicle);saveFleetOrder.addEventListener("click",saveOrder);managerList.addEventListener("click",e=>{const btn=e.target.closest("[data-remove-vehicle]");if(btn)removeVehicle(btn.dataset.removeVehicle)});managerList.addEventListener("dragstart",e=>{const row=e.target.closest(".manager-row");if(!row)return;row.classList.add("dragging");e.dataTransfer.setData("text/plain",row.dataset.draftId)});managerList.addEventListener("dragend",e=>e.target.closest(".manager-row")?.classList.remove("dragging"));managerList.addEventListener("dragover",e=>e.preventDefault());managerList.addEventListener("drop",e=>{e.preventDefault();const target=e.target.closest(".manager-row"),source=e.dataTransfer.getData("text/plain");if(target&&source)reorderDraft(source,target.dataset.draftId)});vehicleDetail.addEventListener("click",e=>{const saveDetails=e.target.closest("[data-save-vehicle-details]"),deleteCheck=e.target.closest("[data-delete-checklist]"),deleteReq=e.target.closest("[data-delete-request]");if(saveDetails)saveVehicleDetails(saveDetails.dataset.saveVehicleDetails);if(deleteCheck)deleteChecklist(deleteCheck.dataset.deleteChecklist);if(deleteReq)deleteRequest(deleteReq.dataset.deleteRequest)});vehicleDetail.addEventListener("change",e=>{const vehicleStatus=e.target.closest("[data-vehicle-status]"),requestStatus=e.target.closest("[data-request-status]");if(vehicleStatus){updateVehicleStatus(vehicleStatus.dataset.vehicleStatus,vehicleStatus.value);return}if(requestStatus)updateRequestStatus(requestStatus.dataset.requestStatus,requestStatus.value)});
adminButton.addEventListener("click",async()=>{if(adminUnlocked){await db.auth.signOut();showToast("Signed out.");return}adminDialog.showModal();supervisorEmail.focus()});$("#cancelAdmin").addEventListener("click",()=>adminDialog.close());adminForm.addEventListener("submit",async e=>{e.preventDefault();const {data,error}=await db.auth.signInWithPassword({email:supervisorEmail.value.trim(),password:supervisorPassword.value});if(error){showToast("Login failed. Check email and password.");return}supervisorPassword.value="";adminDialog.close();setSupervisor(data.user);showToast("Supervisor signed in.")});
db.auth.getSession().then(({data})=>setSupervisor(data.session?.user||null));db.auth.onAuthStateChange((_event,session)=>setSupervisor(session?.user||null));db.channel("fleet-status-sync").on("postgres_changes",{event:"*",schema:"public",table:"fleet_vehicles"},()=>loadData()).on("postgres_changes",{event:"*",schema:"public",table:"fleet_checklists"},()=>loadData()).on("postgres_changes",{event:"*",schema:"public",table:"requests"},()=>loadData()).subscribe();loadData();
</script>

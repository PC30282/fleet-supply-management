const $=id=>document.querySelector(id),fleetList=$("#fleetList"),managerList=$("#managerList"),vehicleDetail=$("#vehicleDetail"),setupNotice=$("#setupNotice"),searchInput=$("#searchInput"),statusFilter=$("#statusFilter"),syncState=$("#syncState"),accessState=$("#accessState"),adminButton=$("#adminButton"),adminDialog=$("#adminDialog"),adminForm=$("#adminForm"),toast=$("#toast"),newVrm=$("#newVrm"),newMake=$("#newMake"),newModel=$("#newModel"),newType=$("#newType"),addVehicleButton=$("#addVehicleButton"),saveFleetOrder=$("#saveFleetOrder"),managerNote=$("#managerNote"),supervisorEmail=$("#supervisorEmail"),supervisorPassword=$("#supervisorPassword");

orted</option><option ${v.status==="Off-Road"?"selected":""}>Off-Road</option></select></div><div class="field"><label for="checklistBy">Checklist completed by</label><input id="checklistBy" value="${escapeHtml(supervisorName())}" autocomplete="off"></div></div><div class="form-actions"><button class="primary-button" data-update-status="${escapeHtml(v.id)}" type="button">Update status</button><button class="quiet-button" data-record-checklist="${escapeHtml(v.id)}" type="button">Record checklist</button></div></section>`}

async function updateStatus(id){const status=$("#detailStatus")?.value;if(!status)return;await check(await db.from("fleet_vehicles").update({status,status_updated_at:new Date().toISOString(),status_updated_by:supervisorName()}).eq("id",id),"Updating status");await loadData();showToast("Vehicle status updated.")}async function recordChecklist(id){const v=vehicles.find(x=>x.id===id),by=$("#checklistBy")?.value.trim()||supervisorName();if(!v)return;await check(await db.from("fleet_checklists").insert({vehicle_id:v.id,vehicle_vrm:formatVrm(v.vrm),completed_by:by}),"Recording checklist");await loadData();showToast("Checklist recorded.")}
function reorderDraft(sourceId,targetId){if(sourceId===targetId)return;const from=draftVehicles.findIndex(v=>v.id===sourceId),to=draftVehicles.findIndex(v=>v.id===targetId);if(from<0||to<0)return;const [moved]=draftVehicles.splice(from,1);draftVehicles.splice(to,0,moved);markDraftDirty();renderManager()}function removeVehicle(id){const v=draftVehicles.find(x=>x.id===id);if(!v)return;v.delete=true;markDraftDirty();renderManager()}
fleetList.addEventListener("click",e=>{const btn=e.target.closest("[data-select]");if(!btn)return;selectedId=btn.dataset.select;render()});searchInput.addEventListener("input",renderFleetList);statusFilter.addEventListener("change",renderFleetList);addVehicleButton.addEventListener("click",addVehicle);saveFleetOrder.addEventListener("click",saveOrder);managerList.addEventListener("click",e=>{const btn=e.target.closest("[data-remove-vehicle]");if(btn)removeVehicle(btn.dataset.removeVehicle)});managerList.addEventListener("dragstart",e=>{const row=e.target.closest(".manager-row");if(!row)return;row.classList.add("dragging");e.dataTransfer.setData("text/plain",row.dataset.draftId)});managerList.addEventListener("dragend",e=>e.target.closest(".manager-row")?.classList.remove("dragging"));managerList.addEventListener("dragover",e=>e.preventDefault());managerList.addEventListener("drop",e=>{e.preventDefault();const target=e.target.closest(".manager-row"),source=e.dataTransfer.getData("text/plain");if(target&&source)reorderDraft(source,target.dataset.draftId)});vehicleDetail.addEventListener("click",e=>{const status=e.target.closest("[data-update-status]"),check=e.target.closest("[data-record-checklist]");if(status)updateStatus(status.dataset.updateStatus);if(check)recordChecklist(check.dataset.recordChecklist)});
adminButton.addEventListener("click",async()=>{if(adminUnlocked){await db.auth.signOut();showToast("Signed out.");return}adminDialog.showModal();supervisorEmail.focus()});$("#cancelAdmin").addEventListener("click",()=>adminDialog.close());adminForm.addEventListener("submit",async e=>{e.preventDefault();const {data,error}=await db.auth.signInWithPassword({email:supervisorEmail.value.trim(),password:supervisorPassword.value});if(error){showToast("Login failed. Check email and password.");return}supervisorPassword.value="";adminDialog.close();setSupervisor(data.user);showToast("Supervisor signed in.")});
db.auth.getSession().then(({data})=>setSupervisor(data.session?.user||null));db.auth.onAuthStateChange((_event,session)=>setSupervisor(session?.user||null));db.channel("fleet-status-sync").on("postgres_changes",{event:"*",schema:"public",table:"fleet_vehicles"},()=>loadData()).on("postgres_changes",{event:"*",schema:"public",table:"fleet_checklists"},()=>loadData()).on("postgres_changes",{event:"*",schema:"public",table:"requests"},()=>loadData()).subscribe();loadData();
